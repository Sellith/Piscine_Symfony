<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <form>
    <div>
      <label for="firstname">Firstname</label> : 
      <input id="firstname" type="text" name="Firstname" placeholder="Ex: Aragorn">
    </div>
    <div>
      <label for="name">Name</label> : 
      <input id="name" type="text" name="Name" placeholder="Ex: Telcontar">
    </div>
    <div>
      <label for="age">Age</label> : 
      <input id="age" type="number" name="Age" placeholder="Ex: 87">
    </div>
    <div>
      <label for="phone">Phone number</label> : 
      <input id="phone" type="tel" name="Phone" placeholder="Ex: 07973137">
    </div>
    <div>
      <label for="email">Email</label> : 
      <input id="email" type="email" name="Email" placeholder="Ex: aragorn@gondor.com">
    </div>
    <div>
      <label for="student">Student at 42 ?</label> : 
      <input id="student" type="checkbox" name="Student">
    </div>
    <fieldset>
      <legend>Gender</legend>
      <div>
        <input type="radio" name="gender" id="gender_male" value="Male" checked>
        <label for="gender_male">Male</label>
      </div>
      <div>
        <input type="radio" name="gender" id="gender_female"  value="Female">
        <label for="gender_female">Female</label>
      </div>
      <div>
        <input type="radio" name="gender" id="gender_other" value="Other">
        <label for="gender_other">Other</label>
      </div>
    </fieldset>
    <button type="button" onclick="displayFormContents()">Send informations</button>
  </form>
  <script src="./popup.js"></script>
</body>
</html>
