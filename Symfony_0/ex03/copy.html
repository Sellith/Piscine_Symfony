<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stacks</title>
  <link rel="stylesheet" href="./style.css" />
  <style>
    h1 {
      text-decoration: underline;
      width: 100%; 
      display: flex;
      margin-bottom: 1em;
    }
  </style>
</head>
<body>
  <h1>Stack les plus utilisees</h1>
  <ul>
    <li>
      
      <h2>Frontend</h2>
      
      <div>
        <div style="width: 80%; display: flex; justify-content: space-between;">
          <p>HTML5</p>
          <p>80%</p>
        </div>
        <progress class="html5" value="80" max="100">80%</progress>
      </div>

      <div>
        <div style="width: 65%; display: flex; justify-content: space-between;">
          <p>CSS3</p>
          <p>65%</p>
        </div>
        <progress class="css3" value="65" max="100">65%</progress>
      </div>
      
      <div>
        <div style="width: 50%; display: flex; justify-content: space-between;">
          <p>jQuery</p>
          <p>50%</p>
        </div>
        <progress class="jquery" value="50" max="100">50%</progress>
      </div>

    </li>

    <li>

      <h2>Backend</h2>

      <div>
        <div style="width: 75%; display: flex; justify-content: space-between;">
          <p>Python</p>
          <p>75%</p>
        </div>
        <progress class="python" value="75" max="100">75%</progress>
      </div>

      <div>
        <div style="width: 65%; display: flex; justify-content: space-between;">
          <p>PHP</p>
          <p>65%</p>
        </div>
        <progress class="php" value="65" max="100">65%</progress>
      </div>
      
      <div>
        <div style="width: 35%; display: flex; justify-content: space-between;">
          <p>Node.js</p>
          <p>35%</p>
        </div>
        <progress class="node-js" value="35" max="100">35%</progress>
      </div>
    </li>
  </ul>
</body>
</html>
